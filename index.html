<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Interaktive Sachsenkarte (DMO-Regionen)</title>
  <style>
    :root{
      --bg:#0b0f1a;
      --text:#e8eefc;
      --muted:#a9b6d6;
      --stroke:rgba(255,255,255,.28);
      --stroke-hover:rgba(255,255,255,.55);
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --panel-bg:rgba(0,0,0,.18);
      --chip-bg:rgba(0,0,0,.18);
      --chip-border:rgba(255,255,255,.12);
    }
    html, body { height:100%; }
    html { scrollbar-gutter: stable; }
    body{
      margin:0;
      padding:16px;
      box-sizing:border-box;
      overflow-y:scroll;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(1200px 700px at 20% 10%, #172244, var(--bg));
      color:var(--text);
      display:grid;
      grid-template-columns:1fr 520px;
      gap:16px;
    }
    * { box-sizing:border-box; }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      box-shadow:var(--shadow);
      min-height:0;
      overflow:hidden;
    }
    .map-wrap{
      position:relative;
      display:grid;
      grid-template-rows:minmax(0, 1fr) auto;
      gap:10px;
      padding:10px;
      height:calc(100vh - 32px);
    }
    #mapWrap{
      display:grid;
      justify-items:center;
      align-items:start;
      min-height:0;
    }
    #mapWrap svg{
      width:min(750px, 100%);
      height:auto;
      display:block;
      user-select:none;
    }
    .tooltip{
      position:absolute;
      transform:translate(-9999px,-9999px);
      padding:10px 12px;
      border-radius:12px;
      background:rgba(10,14,26,.92);
      border:1px solid rgba(255,255,255,.14);
      color:var(--text);
      font-size:13px;
      line-height:1.25;
      box-shadow:var(--shadow);
      pointer-events:none;
      white-space:nowrap;
      max-width:260px;
      z-index:10;
    }
    .tooltip .muted{
      color:var(--muted);
      font-size:12px;
      display:block;
      margin-top:2px;
    }
    .region .flaeche,.region .hit{
      cursor:pointer;
      vector-effect:non-scaling-stroke;
      pointer-events:fill;
    }
    .region image,.region .logo,.region .label{ pointer-events:none; }
    .region .flaeche{
      fill:rgba(110,160,255,.18);
      stroke:var(--stroke);
      stroke-width:1.5;
      transition:fill .18s ease, stroke .18s ease, filter .18s ease, opacity .18s ease;
    }
    .region .hit{ fill:transparent; stroke:transparent; stroke-width:18; }
    .region .grenze{
      fill:none;
      stroke:#ffffff;
      stroke-width:1.5;
      stroke-linejoin:round;
    }
    .region .innerline{
      fill:none;
      stroke:var(--stroke);
      stroke-width:1.2;
      vector-effect:non-scaling-stroke;
      pointer-events:none;
      opacity:.9;
    }
    .region.is-hover .flaeche{
      fill:rgba(110,160,255,.30);
      stroke:var(--stroke-hover);
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.28));
    }
    .region.is-hover .innerline{ stroke:var(--stroke-hover); }
    .region.is-active .flaeche{
      fill:rgba(255,210,80,.32);
      stroke:rgba(255,210,80,.75);
    }
    .region.is-active .innerline{ stroke:rgba(255,210,80,.75); }
    svg.has-selection .region:not(.is-active) .flaeche{ opacity:.40; }
    #leipzig .hit { pointer-events:none; }
    #chemnitz_zwickau_region .hit { pointer-events:none; }

    aside.card{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:14px;
      overflow:auto;
      max-height:calc(100vh - 32px);
    }
    .panel{
      background:var(--panel-bg);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:12px;
    }
    .row{
      display:flex;
      gap:10px;
      align-items:flex-start;
      justify-content:flex-start;
    }
    .small{
      color:var(--muted);
      font-size:12px;
      margin-top:4px;
    }
    .btn{
      appearance:none;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:var(--text);
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
      font-weight:600;
      line-height:1.2;
      transition:transform .05s ease, background .15s ease;
    }
    .btn:active{ transform:translateY(1px); }
    .btn:hover{ background:rgba(255,255,255,.10); }

    .data-popup{
      display:none;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.10);
      border-radius:14px;
      padding:12px;
      width:100%;
      max-width:none;
    }
    .data-popup.is-open{ display:block; }
    .data-popup h2{
      font-size:14px;
      margin:0 0 8px 0;
    }
    .data-popup .meta{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
      margin-bottom:10px;
    }
    .data-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .data-row{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:14px;
  align-items:start;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
}
    .type-chip{
      display:inline-block;
      max-width:100%;
      padding:6px 10px;
      border-radius:999px;
      background:var(--chip-bg);
      border:1px solid var(--chip-border);
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      vertical-align:middle;
    }
    .data-sys{ min-width:0; }
    .sys-stack{
  display:flex;
  flex-direction:column;   /* Chips vertikal */
  gap:6px;
  align-items:flex-start;
}
    .sys-chip{
      display:inline-flex;
      align-items:center;
      justify-content:flex-start;
      max-width:100%;
      padding:6px 10px;
      border-radius:999px;
      background:var(--chip-bg);
      border:1px solid var(--chip-border);
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      overflow-wrap:normal;
      word-break:normal;
    }
    @media (max-width:980px){
      body{ grid-template-columns:1fr; }
      .map-wrap{ height:auto; min-height:60vh; }
      aside.card{ max-height:none; }
      .data-row{ grid-template-columns:minmax(110px, 180px) minmax(0, 1fr); }
    }
  </style>
</head>
<body>
  <main class="card map-wrap">
    <div id="tooltip" class="tooltip" role="status" aria-live="polite"></div>
    <div id="mapWrap"></div>
  </main>

  <aside class="card">
    <div class="panel" id="selectedCard">
      <div class="row">
        <div style="flex:1 1 auto; min-width:0;">
          <div id="selectedName" style="font-weight:800;">Keine Region gewählt</div>
          <div id="selectedMeta" class="small">Klicke auf eine Fläche in der Karte.</div>
        </div>
        <button id="clearBtn" class="btn" type="button" title="Auswahl zurücksetzen">↺</button>
      </div>
      <div class="row" style="margin-top:6px;">
        <button id="openBtn" class="btn" style="display:none">
Website öffnen
</button>
      </div>
      <div id="contactCard" style="margin-top:8px; display:none;">
        <div id="contactName" style="font-weight:600;">Ansprechpartner: –</div>
        <div id="contactEmail" class="small">E-Mail: –</div>
      </div>
    </div>

    <div id="dataPopup" class="data-popup" aria-live="polite">
      <h2 id="dataPopupTitle">Datenübersicht</h2>
      <div id="dataPopupHint" class="meta"></div>
      <div id="dataPopupList" class="data-list" aria-label="Datenarten und Pflegesysteme"></div>
    </div>
  </aside>

  <script>
    async function loadText(url){
      const res = await fetch(url);
      if(!res.ok) throw new Error(`Fetch failed: ${url} (${res.status})`);
      return await res.text();
    }

    function parseCSV(text){
      const lines = text.split(/\r?\n/).filter(l => l.trim().length);
      if(!lines.length) return [];
      const header = parseCSVLine(lines.shift());

      return lines.map(line => {
        const cols = parseCSVLine(line);
        const obj = {};
        header.forEach((h,i) => obj[h] = (cols[i] ?? '').trim());
        return obj;
      });

      function parseCSVLine(line){
        const out = [];
        let cur = '';
        let inQuotes = false;
        for(let i=0;i<line.length;i++){
          const ch = line[i];
          if(inQuotes){
            if(ch === '"'){
              if(i+1 < line.length && line[i+1] === '"'){
                cur += '"';
                i++;
              }else{
                inQuotes = false;
              }
            }else{
              cur += ch;
            }
          }else{
            if(ch === '"'){
              inQuotes = true;
            }else if(ch === ','){
              out.push(cur);
              cur = '';
            }else{
              cur += ch;
            }
          }
        }
        out.push(cur);
        return out;
      }
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[c]));
    }

    function sanitizeValue(v){
      let s = String(v ?? '').trim();
      s = s.replace(/^[\\"'“”]+/, '').replace(/[\\"'“”]+$/, '').trim();
      return s;
    }

    function formatSystem(sys){
      let raw = sanitizeValue(sys);
      raw = raw
        .replace(/\s+und\s+/gi, ', ')
        .replace(/\s+bzw\.\s+/gi, ', ')
        .replace(/\s*&\s*/g, ', ')
        .replace(/\s*\|\s*/g, ', ')
        .replace(/\s*;\s*/g, ', ')
        .replace(/\s*\/\s*/g, ', ');

      const parts = raw.split(',').map(s => sanitizeValue(s)).filter(Boolean);

      if(parts.length <= 1){
        const one = parts[0] || '';
        return `<div class="sys-stack"><span class="sys-chip">${escapeHtml(one)}</span></div>`;
      }

      return `<div class="sys-stack">${parts.map(p => `<span class="sys-chip">${escapeHtml(p)}</span>`).join('')}</div>`;
    }

    function initApp(){
      const svg = document.getElementById('sachsenMap');
      const tooltip = document.getElementById('tooltip');
      const selectedName = document.getElementById('selectedName');
      const selectedMeta = document.getElementById('selectedMeta');
      const clearBtn = document.getElementById('clearBtn');
      const openBtn = document.getElementById('openBtn');
      const dataPopup = document.getElementById('dataPopup');
      const dataPopupTitle = document.getElementById('dataPopupTitle');
      const dataPopupHint = document.getElementById('dataPopupHint');
      const dataPopupList = document.getElementById('dataPopupList');
      const contactCard = document.getElementById('contactCard');
      const contactName = document.getElementById('contactName');
      const contactEmail = document.getElementById('contactEmail');

      const DATA_CATALOG = window.DATA_CATALOG || {};
      const CONTACTS = {
        saechsisch:              { name: '', email: '' },
        erzgebirge:              { name: '', email: '' },
        oberlausitz:             { name: '', email: '' },
        leipzig:                 { name: '', email: '' },
        leipzig_stadt:           { name: '', email: '' },
        dresden:                 { name: '', email: '' },
        dresden_stadt:           { name: '', email: '' },
        chemnitz_zwickau_region: { name: '', email: '' },
        chemnitz_stadt:          { name: '', email: '' },
        vogtland:                { name: '', email: '' }
      };

      const regions = Array.from(svg.querySelectorAll('g.region[id]'));
      let activeId = null;

      function renderDataPopup(regionId, regionName){
        const rows = DATA_CATALOG[regionId] || [];
        dataPopupTitle.textContent = `Datenübersicht: ${regionName}`;
        dataPopupHint.textContent = rows.length
          ? 'Übersicht der Datenarten und des Pflegesystems für diese Region.'
          : 'Für diese Region sind noch keine Datenarten hinterlegt.';
        dataPopupList.innerHTML = rows.map(r => `
          <div class="data-row">
            <div class="type-chip">${escapeHtml(r.type)}</div>
            <div class="data-sys">${formatSystem(r.system)}</div>
          </div>
        `).join('');
        dataPopup.classList.add('is-open');
      }

      function closeDataPopup(){
        dataPopup.classList.remove('is-open');
      }

      function showTooltip(text, sub){
        tooltip.innerHTML = `<strong>${escapeHtml(text)}</strong>${sub ? `<span class="muted">${escapeHtml(sub)}</span>` : ''}`;
        tooltip.style.transform = 'translate(0,0)';
      }

      function moveTooltip(clientX, clientY){
        const pad = 10;
        const rect = tooltip.getBoundingClientRect();
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        let x = clientX + pad;
        let y = clientY + pad;
        if (x + rect.width + pad > vw) x = clientX - rect.width - pad;
        if (y + rect.height + pad > vh) y = clientY - rect.height - pad;
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
      }

      function hideTooltip(){
        tooltip.style.transform = 'translate(-9999px, -9999px)';
      }

      function svgToLocalPoint(evt){
        const pt = svg.createSVGPoint();
        pt.x = evt.clientX;
        pt.y = evt.clientY;
        const ctm = svg.getScreenCTM();
        if (!ctm) return { x: 0, y: 0 };
        const local = pt.matrixTransform(ctm.inverse());
        return { x: local.x, y: local.y };
      }

      function pickRegion(evt){
        const p = svgToLocalPoint(evt);
        const chemnitzCityPath = document.querySelector('#chemnitz_stadt path.flaeche');
        if (chemnitzCityPath && chemnitzCityPath.isPointInFill && chemnitzCityPath.isPointInFill(p)) {
          return document.getElementById('chemnitz_stadt');
        }
        const leipzigCityPath = document.querySelector('#leipzig_stadt path.flaeche');
        if (leipzigCityPath && leipzigCityPath.isPointInFill && leipzigCityPath.isPointInFill(p)) {
          return document.getElementById('leipzig_stadt');
        }
        const hit = evt.target.closest('path.flaeche, path.hit');
        return hit ? hit.closest('g.region') : null;
      }

      function clearSelection(){
        activeId = null;
        svg.classList.remove('has-selection');
        regions.forEach(g => g.classList.remove('is-active'));
        selectedName.textContent = 'Keine Region gewählt';
        selectedMeta.textContent = 'Klicke auf eine Fläche in der Karte.';
        openBtn.disabled = true;
        openBtn.onclick = null;
        contactCard.style.display = 'none';
        contactName.textContent = 'Ansprechpartner: –';
        contactEmail.textContent = 'E-Mail: –';
        closeDataPopup();
      }

      function selectById(id){
        if (activeId === id) {
          clearSelection();
          return;
        }
        const g = regions.find(x => x.id === id);
        if (!g) return;

        activeId = id;
        svg.classList.add('has-selection');
        regions.forEach(x => x.classList.toggle('is-active', x.id === id));

        const name = g.dataset.name || g.id;
        const url = g.dataset.url || '';
        selectedName.textContent = name;
        selectedMeta.textContent = '';

openBtn.style.display = url ? "inline-flex" : "none";
openBtn.disabled = !url;

openBtn.onclick = () => {
  if (url) window.open(url, '_blank', 'noopener,noreferrer');
};
        
        const c = CONTACTS[id] || {};
        contactName.textContent = `Ansprechpartner: ${c.name || '–'}`;
        contactEmail.textContent = `E-Mail: ${c.email || '–'}`;
        contactCard.style.display = 'block';

        renderDataPopup(g.id, name);

        openBtn.disabled = !url;
        openBtn.onclick = () => {
          if (url) window.open(url, '_blank', 'noopener,noreferrer');
        };
      }

      (function fitViewBox(){
        const bbox = svg.getBBox();
        const pad = 20;
        svg.setAttribute('viewBox', `${bbox.x - pad} ${bbox.y - pad} ${bbox.width + pad*2} ${bbox.height + pad*2}`);
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      })();

      svg.addEventListener('pointermove', (e) => {
        const p = e.target.closest('path.flaeche, path.hit');
        if (!p) return;
        const g = p.closest('g.region[id]');
        if (!g) return;
        const name = g.dataset.name || g.id;
        const hint = activeId && activeId !== g.id ? 'Klicken zum Wechseln' : 'Klicken zum Auswählen';
        showTooltip(name, hint);
        moveTooltip(e.clientX, e.clientY);
      });

      svg.addEventListener('pointerover', (e) => {
        const p = e.target.closest('path.flaeche, path.hit');
        if (!p) return;
        const g = p.closest('g.region[id]');
        if (g) g.classList.add('is-hover');
      });

      svg.addEventListener('pointerout', (e) => {
        const g = e.target.closest('g.region[id]');
        if (g) g.classList.remove('is-hover');
        const related = e.relatedTarget;
        if (!related || !svg.contains(related)) hideTooltip();
      });

      svg.addEventListener('click', (e) => {
        const g = pickRegion(e);
        if (!g) return;
        selectById(g.id);
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') clearSelection();
      });

      clearBtn.addEventListener('click', clearSelection);
      clearSelection();
    }

    async function boot(){
      const svgText = await loadText('sachsenkarte.svg');
      document.getElementById('mapWrap').innerHTML = svgText;

      const csvText = await loadText('datenpopup.csv');
      const rows = parseCSV(csvText);
      const byRegion = {};
      for(const r of rows){
        const id = r.region_id;
        if(!byRegion[id]) byRegion[id] = [];
        byRegion[id].push({ type: r.datenart, system: r.system });
      }
      window.DATA_CATALOG = byRegion;

      initApp();
    }

    document.addEventListener('DOMContentLoaded', () => {
      boot().catch(err => console.error(err));
    });
  </script>
</body>
</html>
