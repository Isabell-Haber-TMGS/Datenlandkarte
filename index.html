<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Interaktive Sachsenkarte (DMO-Regionen)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card map-wrap">
    <div class="tooltip" id="tooltip" role="status" aria-live="polite"></div>

    <div id="mapWrap">
      <div class="status">Sachsenkarte wird geladen …</div>
    </div>
  </main>

  <aside class="card">
    <div style="padding:8px 14px 14px 14px; display:grid; grid-auto-rows:auto; align-content:start; gap:6px; min-height:0;"></div>

    <div class="panel">
  <div class="header-row">
    <div class="header-main">
      <div id="selectedName" class="region-name">Keine Region gewählt</div>
      <div class="small" id="selectedMeta">Klicke auf eine Fläche in der Karte.</div>
    </div>

    <div class="header-actions">
      <button class="btn" id="clearBtn" type="button" title="Auswahl zurücksetzen">↺</button>

      <div id="contactCard" class="contact-inline" style="display:none;">
        <button id="contactToggle" class="contact-toggle-inline" type="button" aria-expanded="false">
          <span>Ansprechpersonen</span>
          <span id="contactToggleIcon">▾</span>
        </button>
      </div>
    </div>
  </div>

  <div id="contactListWrap" class="contact-list-wrap" hidden>
    <div id="contactList" class="contact-list"></div>
  </div>

  <div class="row" style="margin-top:4px;">
    <button class="btn" id="openBtn" type="button" hidden disabled>Website öffnen</button>
  </div>

  <div id="leipzigModeSwitch" class="mode-switch" hidden>
    <button class="btn mode-btn is-active" id="modeConventionBtn" type="button">
      Convention
    </button>
    <button class="btn mode-btn" id="modeOnlineBtn" type="button">
      Online-Abteilung
    </button>
  </div>
</div>

      <div id="contactCard" class="contact-card" style="display:none;">
        <div class="contact-title">Ansprechpersonen</div>
        <div id="contactList" class="contact-list"></div>
      </div>
    </div>

    <div class="data-popup" id="dataPopup" aria-live="polite">
      <h2 id="dataPopupTitle">Datenübersicht</h2>
      <div class="meta" id="dataPopupHint"></div>
      <div class="data-list" id="dataPopupList" aria-label="Datenarten und Pflegesysteme"></div>
    </div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
