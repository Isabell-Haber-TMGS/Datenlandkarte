<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Interaktive Sachsenkarte (DMO-Regionen)</title>

<style>
:root{
  --bg:#0b0f1a;
  --text:#e8eefc;
  --muted:#a9b6d6;
  --stroke:rgba(255,255,255,.28);
  --stroke-hover:rgba(255,255,255,.55);
  --shadow:0 10px 30px rgba(0,0,0,.35);
}

html,body{height:100%}
html{scrollbar-gutter:stable}

body{
  margin:0;
  padding:16px;
  box-sizing:border-box;
  overflow-y:scroll;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:radial-gradient(1200px 700px at 20% 10%, #172244, var(--bg));
  color:var(--text);
  display:grid;
  grid-template-columns:1fr 520px;
  gap:16px;
}

*{box-sizing:border-box}

.card{
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  box-shadow:var(--shadow);
  overflow:hidden;
}

.map-wrap{
  position:relative;
  display:grid;
  grid-template-rows:minmax(0,1fr) auto;
  gap:10px;
  padding:10px;
  height:calc(100vh - 32px);
}

#mapWrap{
  display:grid;
  justify-items:center;
}

svg{
  width:min(750px,100%);
  height:auto;
  display:block;
  user-select:none;
}

.tooltip{
  position:absolute;
  transform:translate(-9999px,-9999px);
  padding:10px 12px;
  border-radius:12px;
  background:rgba(10,14,26,.92);
  border:1px solid rgba(255,255,255,.14);
  color:var(--text);
  font-size:13px;
  line-height:1.25;
  box-shadow:var(--shadow);
  pointer-events:none;
  white-space:nowrap;
  max-width:260px;
}

.tooltip .muted{
  color:var(--muted);
  font-size:12px;
  display:block;
  margin-top:2px;
}

aside.card{
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:14px;
  overflow:auto;
}

.panel{
  background:rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:12px;
}

.row{
  display:flex;
  gap:10px;
  align-items:flex-start;
}

.small{
  color:var(--muted);
  font-size:12px;
}

.btn{
  appearance:none;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);
  color:var(--text);
  border-radius:12px;
  padding:10px 12px;
  cursor:pointer;
  font-weight:600;
}

.btn:hover{
  background:rgba(255,255,255,.10);
}

.hidden{
  display:none !important;
}

.data-popup{
  display:none;
  background:rgba(0,0,0,.22);
  border:1px solid rgba(255,255,255,.10);
  border-radius:14px;
  padding:12px;
}

.data-popup.is-open{
  display:block;
}

.data-popup h2{
  font-size:14px;
  margin:0 0 8px 0;
}

.data-popup .meta{
  color:var(--muted);
  font-size:12px;
  margin-bottom:10px;
}

.data-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.data-row{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:14px;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
}

.type-chip{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.12);
  font-weight:700;
  white-space:nowrap;
}

.sys-stack{
  display:flex;
  flex-direction:column;
  gap:6px;
  align-items:flex-start;
}

.sys-chip{
  display:inline-flex;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.12);
  font-weight:700;
  white-space:nowrap;
}

@media (max-width:980px){
  body{grid-template-columns:1fr;}
  .map-wrap{height:auto;min-height:60vh;}
}
</style>
</head>

<body>

<main class="card map-wrap">
<div id="tooltip" class="tooltip"></div>
<div id="mapWrap"></div>
</main>

<aside class="card">

<div class="panel">

<div class="row">

<div style="flex:1">
<div id="selectedName" style="font-weight:800">
Keine Region gewählt
</div>
<div id="selectedMeta" class="small">
Klicke auf eine Fläche in der Karte.
</div>
</div>

<button id="clearBtn" class="btn">↺</button>

</div>

<div style="margin-top:6px">
<button id="openBtn" class="btn hidden" disabled>
Website öffnen
</button>
</div>

<div id="contactCard" style="margin-top:8px;display:none">
<div id="contactName" style="font-weight:600">
Ansprechpartner: –
</div>
<div id="contactEmail" class="small">
E-Mail: –
</div>
</div>

</div>

<div id="dataPopup" class="data-popup">
<h2 id="dataPopupTitle">Datenübersicht</h2>
<div id="dataPopupHint" class="meta"></div>
<div id="dataPopupList" class="data-list"></div>
</div>

</aside>

<script>

function parseCSV(text){

const lines=text.split(/\r?\n/).filter(l=>l.trim().length)
if(!lines.length)return[]

const header=lines.shift().split(",")

return lines.map(line=>{
const cols=line.split(",")
const obj={}
header.forEach((h,i)=>obj[h]=cols[i]?.trim())
return obj
})

}

function formatSystem(sys){

let raw=sys
.replace(/\s+und\s+/gi,", ")
.replace(/\s*\/\s*/g,", ")
.replace(/\s*;\s*/g,", ")

const parts=raw.split(",").map(s=>s.trim()).filter(Boolean)

return `
<div class="sys-stack">
${parts.map(p=>`<span class="sys-chip">${p}</span>`).join("")}
</div>
`

}

function initApp(){

const rows=window.DATA_CATALOG||{}
const list=document.getElementById("dataPopupList")

function render(region){

const data=rows[region]||[]

list.innerHTML=data.map(r=>`
<div class="data-row">
<div class="type-chip">${r.type}</div>
<div class="data-sys">
${formatSystem(r.system)}
</div>
</div>
`).join("")

document.getElementById("dataPopup").classList.add("is-open")

}

window.renderDataPopup=render

}

async function boot(){

const svgText=await fetch("sachsenkarte.svg").then(r=>r.text())
document.getElementById("mapWrap").innerHTML=svgText

const csv=await fetch("datenpopup.csv").then(r=>r.text())

const rows=parseCSV(csv)
const map={}

rows.forEach(r=>{
if(!map[r.region_id])map[r.region_id]=[]
map[r.region_id].push({
type:r.datenart,
system:r.system
})
})

window.DATA_CATALOG=map

initApp()

}

document.addEventListener("DOMContentLoaded",boot)

</script>

</body>
</html>
